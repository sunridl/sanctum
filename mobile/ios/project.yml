name: SanctumMobile
options:
  bundleIdPrefix: com.sanctum
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  SanctumMobile:
    type: application
    platform: iOS
    sources:
      - path: SanctumMobile
    info:
      path: SanctumMobile/Info.plist
      properties:
        CFBundleDisplayName: Sanctum
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Allow plain HTTP to localhost so the simulator can reach the
        # FastAPI dev server on http://localhost:8000. Production builds
        # would point at HTTPS and this exception would be removed.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
            127.0.0.1:
              NSExceptionAllowsInsecureHTTPLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanctum.mobile
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO

  SanctumMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SanctumMobileUITests
    dependencies:
      - target: SanctumMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanctum.mobile.uitests
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
