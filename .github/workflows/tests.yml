name: Sanctum Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and start backend
        env:
          SANCTUM_SECRET_KEY: ${{ secrets.SANCTUM_SECRET_KEY }}
        run: |
          cd backend
          docker build -t sanctum-backend .
          docker run -d -p 8000:8000 \
            -e SANCTUM_SECRET_KEY="$SANCTUM_SECRET_KEY" \
            --name backend sanctum-backend

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8000/docs > /dev/null && exit 0
            sleep 1
          done
          echo "backend never became ready"
          docker logs backend
          exit 1

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Build and start frontend
        run: |
          cd frontend
          npm install
          npm run build
          npm run preview -- --port 5173 --host 0.0.0.0 &
          for i in {1..20}; do
            curl -sf http://localhost:5173/ > /dev/null && exit 0
            sleep 1
          done
          echo "frontend never became ready"
          exit 1

      - name: Run pytest suite (API + Playwright UI)
        run: pytest tests_py/ -v

      - name: Install Playwright JS suite
        run: |
          cd tests
          npm install

      - name: Run Playwright tests (JS)
        run: |
          cd tests
          npx playwright test

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: tests/allure-results
